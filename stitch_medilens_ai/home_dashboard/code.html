<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MediLens AI - Home Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed": "#002113",
                        "on-primary-container": "#00422b",
                        "primary-container": "#10b981",
                        "surface-bright": "#f8f9ff",
                        "on-tertiary-fixed": "#2a1700",
                        "surface-container-highest": "#d3e4fe",
                        "on-secondary-fixed": "#00174b",
                        "tertiary-container": "#e29100",
                        "secondary": "#0051d5",
                        "inverse-on-surface": "#eaf1ff",
                        "on-surface-variant": "#3c4a42",
                        "on-primary-fixed-variant": "#005236",
                        "inverse-surface": "#213145",
                        "on-error": "#ffffff",
                        "on-tertiary-container": "#523200",
                        "surface-container-low": "#eff4ff",
                        "surface": "#f8f9ff",
                        "tertiary-fixed": "#ffddb8",
                        "primary": "#006c49",
                        "secondary-fixed": "#dbe1ff",
                        "background": "#f8f9ff",
                        "secondary-container": "#316bf3",
                        "outline-variant": "#bbcabf",
                        "on-secondary-container": "#fefcff",
                        "on-secondary-fixed-variant": "#003ea8",
                        "outline": "#6c7a71",
                        "tertiary": "#855300",
                        "on-background": "#0b1c30",
                        "surface-tint": "#006c49",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed-variant": "#653e00",
                        "on-secondary": "#ffffff",
                        "secondary-fixed-dim": "#b4c5ff",
                        "primary-fixed": "#6ffbbe",
                        "inverse-primary": "#4edea3",
                        "primary-fixed-dim": "#4edea3",
                        "surface-container-high": "#dce9ff",
                        "on-surface": "#0b1c30",
                        "error-container": "#ffdad6",
                        "surface-variant": "#d3e4fe",
                        "surface-dim": "#cbdbf5",
                        "tertiary-fixed-dim": "#ffb95f",
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a",
                        "surface-container": "#e5eeff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "2xl": "1rem"
                    },
                    "spacing": {
                        "sm": "12px",
                        "lg": "24px",
                        "container-padding": "20px",
                        "md": "16px",
                        "xl": "32px",
                        "base": "8px",
                        "gutter": "16px",
                        "xs": "4px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "headline-lg": ["Inter"],
                        "display-lg": ["Inter"],
                        "title-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "title-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .glass-card {
            background-color: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.8);
            border-left: 1px solid rgba(255, 255, 255, 0.8);
            border-right: 1px solid rgba(241, 245, 249, 0.5);
            border-bottom: 1px solid rgba(241, 245, 249, 0.5);
        }
        
        body {
            background-color: #F8FAFC;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen pb-32">
<!-- TopAppBar -->
<header class="flex justify-between items-center px-container-padding h-16 w-full sticky top-0 z-40 bg-surface/70 dark:bg-inverse-surface/70 backdrop-blur-xl border-b border-white/20 dark:border-white/10 shadow-sm">
<div class="flex items-center gap-md">
<img class="w-10 h-10 rounded-full object-cover shadow-sm" data-alt="A professional headshot of a person, soft lighting, neutral background, modern healthcare context, crisp detail, 4k resolution." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAldbxn70CzgDMPunMhySZvR_xbb4jY_v5nyztUVQdvCPwc0ctGd74nd8yokrem8b7xvvknTxo4lVBsa9h5E7DyG-_FLzAMFj2reu7vNDLdCey6Yu7Pzos0rFX7IGx8Gom04jmKi_Vr_6K0PrhNVdF9RA_V3FnpF1ve2h-X-INEf9Q_yvuEG-nBip0sg-zAU--7eeHy9CAFPLOxq843zpxVfcZuC7YgYokVj2k_qpDgVS2THeEwSXhWGqvHjVlzRFuRFaCRUwhuxw"/>
<div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary dark:text-primary-fixed-dim tight-tracking">Good Morning 👋</h1>
<p class="font-label-sm text-label-sm text-on-surface-variant">Prajwal</p>
</div>
</div>
<button class="hover:opacity-80 transition-opacity active:scale-95 text-on-surface-variant dark:text-outline-variant p-2">
<span class="material-symbols-outlined text-primary">notifications</span>
</button>
</header>
<main class="max-w-[1200px] mx-auto px-container-padding pt-lg space-y-xl">
<!-- Search -->
<section>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
<input class="w-full h-12 pl-12 pr-4 bg-[#F1F5F9] rounded-full border border-transparent focus:border-primary focus:bg-white focus:ring-0 transition-all font-body-lg text-body-lg text-on-background placeholder-on-surface-variant/50" placeholder="Search medicines..." type="text"/>
</div>
</section>
<!-- Quick Action Cards (Grid) -->
<section>
<div class="grid grid-cols-2 md:grid-cols-4 gap-md">
<button class="glass-card rounded-2xl p-4 flex flex-col items-center justify-center gap-sm active:scale-95 transition-transform hover:shadow-lg shadow-sm">
<div class="w-12 h-12 rounded-full bg-primary-container/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[24px]">document_scanner</span>
</div>
<span class="font-label-sm text-label-sm text-on-background">Scan Medicine</span>
</button>
<button class="glass-card rounded-2xl p-4 flex flex-col items-center justify-center gap-sm active:scale-95 transition-transform hover:shadow-lg shadow-sm">
<div class="w-12 h-12 rounded-full bg-primary-container/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[24px]">photo_camera</span>
</div>
<span class="font-label-sm text-label-sm text-on-background">Prescription Scan</span>
</button>
<button class="glass-card rounded-2xl p-4 flex flex-col items-center justify-center gap-sm active:scale-95 transition-transform hover:shadow-lg shadow-sm">
<div class="w-12 h-12 rounded-full bg-primary-container/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[24px]">smart_toy</span>
</div>
<span class="font-label-sm text-label-sm text-on-background">AI Assistant</span>
</button>
<button class="glass-card rounded-2xl p-4 flex flex-col items-center justify-center gap-sm active:scale-95 transition-transform hover:shadow-lg shadow-sm">
<div class="w-12 h-12 rounded-full bg-primary-container/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[24px]">alarm</span>
</div>
<span class="font-label-sm text-label-sm text-on-background">Reminders</span>
</button>
</div>
</section>
<!-- Today's Medicines -->
<section class="space-y-md">
<div class="flex justify-between items-center">
<h2 class="font-title-md text-title-md text-on-background">Today's Medicines</h2>
<button class="font-label-sm text-label-sm text-primary hover:opacity-80">See All</button>
</div>
<div class="flex flex-col gap-sm">
<!-- Med Card 1 -->
<div class="bg-white rounded-2xl p-4 border border-[#F1F5F9] shadow-sm flex items-center justify-between">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-xl bg-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined text-primary">pill</span>
</div>
<div>
<h3 class="font-body-lg text-body-lg font-semibold text-on-background">Paracetamol</h3>
<div class="flex items-center gap-2 mt-1">
<span class="px-2 py-0.5 rounded-full bg-error-container/30 text-error font-label-sm text-[10px]">After Meal</span>
<span class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">schedule</span>08:00 AM</span>
</div>
</div>
</div>
<button class="h-10 px-6 bg-primary text-white rounded-lg font-label-sm text-label-sm active:scale-95 transition-transform hover:opacity-90">Take</button>
</div>
<!-- Med Card 2 -->
<div class="bg-white rounded-2xl p-4 border border-[#F1F5F9] shadow-sm flex items-center justify-between">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-xl bg-tertiary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary">medication</span>
</div>
<div>
<h3 class="font-body-lg text-body-lg font-semibold text-on-background">Vitamin D</h3>
<div class="flex items-center gap-2 mt-1">
<span class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">schedule</span>01:00 PM</span>
</div>
</div>
</div>
<button class="h-10 px-6 bg-surface-variant text-primary rounded-lg font-label-sm text-label-sm active:scale-95 transition-transform hover:bg-surface-dim">Upcoming</button>
</div>
</div>
</section>
<!-- Additional Actions -->
<section class="space-y-md">
<h2 class="font-title-md text-title-md text-on-background">Quick Actions</h2>
<div class="flex overflow-x-auto gap-md pb-4 snap-x no-scrollbar">
<div class="snap-start shrink-0 w-32 bg-white rounded-2xl p-4 border border-[#F1F5F9] shadow-sm flex flex-col gap-3">
<div class="w-10 h-10 rounded-full bg-secondary-container/20 flex items-center justify-center text-secondary">
<span class="material-symbols-outlined">local_pharmacy</span>
</div>
<span class="font-label-sm text-label-sm text-on-background leading-tight">Nearby<br/>Pharmacy</span>
</div>
<div class="snap-start shrink-0 w-32 bg-white rounded-2xl p-4 border border-[#F1F5F9] shadow-sm flex flex-col gap-3">
<div class="w-10 h-10 rounded-full bg-primary-container/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">history</span>
</div>
<span class="font-label-sm text-label-sm text-on-background leading-tight">Medicine<br/>History</span>
</div>
<div class="snap-start shrink-0 w-32 bg-white rounded-2xl p-4 border border-[#F1F5F9] shadow-sm flex flex-col gap-3">
<div class="w-10 h-10 rounded-full bg-error/10 flex items-center justify-center text-error">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">emergency</span>
</div>
<span class="font-label-sm text-label-sm text-on-background leading-tight">Emergency<br/>Contacts</span>
</div>
<div class="snap-start shrink-0 w-32 bg-white rounded-2xl p-4 border border-[#F1F5F9] shadow-sm flex flex-col gap-3">
<div class="w-10 h-10 rounded-full bg-tertiary-container/20 flex items-center justify-center text-tertiary">
<span class="material-symbols-outlined">folder_special</span>
</div>
<span class="font-label-sm text-label-sm text-on-background leading-tight">Health<br/>Records</span>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-6 left-0 right-0 z-50 md:hidden flex justify-around items-center px-4 py-2 fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] rounded-full bg-surface/70 dark:bg-inverse-surface/70 backdrop-blur-xl border border-white/20 dark:border-white/10 shadow-xl shadow-primary/10">
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full p-2 h-12 w-12 hover:bg-primary-container/20 transition-colors active:scale-90 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant p-2 hover:bg-primary-container/20 transition-colors active:scale-90 transition-transform">
<span class="material-symbols-outlined">document_scanner</span>
<span class="font-label-sm text-[10px] mt-1">Scan</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant p-2 hover:bg-primary-container/20 transition-colors active:scale-90 transition-transform">
<span class="material-symbols-outlined">smart_toy</span>
<span class="font-label-sm text-[10px] mt-1">AI</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant p-2 hover:bg-primary-container/20 transition-colors active:scale-90 transition-transform">
<span class="material-symbols-outlined">notifications</span>
<span class="font-label-sm text-[10px] mt-1">Alerts</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant p-2 hover:bg-primary-container/20 transition-colors active:scale-90 transition-transform">
<span class="material-symbols-outlined">person</span>
<span class="font-label-sm text-[10px] mt-1">Profile</span>
</button>
</nav>
<style>
        /* Hide scrollbar for horizontal scrolling containers */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</body></html>
