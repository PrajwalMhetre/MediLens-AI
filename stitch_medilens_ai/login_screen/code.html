<style>
        @keyframes float-pill {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.1; }
            50% { transform: translateY(-20px) rotate(10deg); opacity: 0.2; }
            100% { transform: translateY(0) rotate(0deg); opacity: 0.1; }
        }

        .pill-shape {
            position: absolute;
            width: 60px;
            height: 120px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(0, 108, 73, 0.1));
            border-radius: 9999px;
            animation: float-pill 8s ease-in-out infinite;
            filter: blur(8px);
            z-index: -1;
        }

        .pill-1 { top: 10%; left: 15%; animation-delay: 0s; transform: rotate(15deg); }
        .pill-2 { top: 40%; right: 10%; animation-delay: 2s; transform: rotate(-25deg); }
        .pill-3 { bottom: 15%; left: 20%; animation-delay: 4s; transform: rotate(45deg); width: 80px; height: 160px; }
        .pill-4 { bottom: 30%; right: 25%; animation-delay: 1s; transform: rotate(-10deg); }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-top-color: rgba(255, 255, 255, 1);
            border-left-color: rgba(255, 255, 255, 1);
            box-shadow: 0 4px 24px rgba(16, 185, 129, 0.05);
        }
        
        .input-glass {
             background: #F1F5F9;
             border: 1px solid transparent;
             transition: all 0.3s ease;
        }
        .input-glass:focus {
            background: #FFFFFF;
            border-color: #10b981;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.1);
        }
    </style>

<!-- Ambient Background -->
<div aria-hidden="true" class="absolute inset-0 pointer-events-none">
<div class="absolute inset-0 bg-gradient-to-br from-surface-bright via-surface-container to-surface-container-high opacity-50"></div>
<div class="pill-shape pill-1"></div>
<div class="pill-shape pill-2"></div>
<div class="pill-shape pill-3"></div>
<div class="pill-shape pill-4"></div>
</div>
<!-- Main Content Canvas -->
<main class="w-full max-w-[440px] px-container-padding py-xl md:py-0 relative z-10 flex flex-col items-center">
<!-- Logo / Brand Area -->
<div class="mb-lg flex flex-col items-center justify-center text-center">
<div class="w-16 h-16 rounded-full bg-primary-container/20 flex items-center justify-center mb-sm">

                </span>
</div>

</div>
<!-- Login Card -->
<div class="glass-panel w-full rounded-[24px] p-lg md:p-xl flex flex-col gap-lg">
<div class="text-center">
<h2 class="font-title-md text-title-md text-on-surface mb-xs">Welcome Back</h2>
<p class="font-body-sm text-body-md text-on-surface-variant">Sign in to continue your journey.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-md" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant px-2" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">
                            mail
                        </span>
<input class="input-glass w-full h-[48px] rounded-full pl-12 pr-4 font-body-md text-body-md text-on-surface placeholder:text-outline-variant outline-none" id="email" placeholder="doctor@medilens.ai" type="email"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center px-2">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">
                            lock
                        </span>
<input class="input-glass w-full h-[48px] rounded-full pl-12 pr-12 font-body-md text-body-md text-on-surface placeholder:text-outline-variant outline-none" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined">
                                visibility_off
                            </span>
</button>
</div>
</div>
<button class="w-full h-[48px] bg-primary text-on-primary rounded-lg font-label-sm text-label-sm mt-sm hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    Login
                    <span class="material-symbols-outlined text-[18px]">
                        arrow_forward
                    </span>
</button>
</form>
<div class="relative flex items-center justify-center py-2">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative bg-surface/50 px-4 font-label-sm text-label-sm text-on-surface-variant backdrop-blur-sm rounded-full">

                </div>
