services:
  backend:
    build:
      context: ./backend
    environment:
      API_TITLE: ${API_TITLE:-MediLens AI Backend}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/medilens.db}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://localhost:8000}
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data

  frontend:
    build:
      context: .
      args:
        API_BASE_URL: ${API_BASE_URL:-http://localhost:8000/api}
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  backend-data:
